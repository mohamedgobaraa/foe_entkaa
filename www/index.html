<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتقاء جهاز مستقبل مصر</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <!-- SheetJS (local for offline) -->
  <script src="xlsx.full.min.js"></script>
</head>
<body>

  <!-- ── SETUP OVERLAY ── -->
  <div id="setup-overlay" class="overlay active">
    <div class="setup-card">
      <div class="setup-logo">
        <img class="brand-logo setup-brand-logo" src="logo.png" alt="إنتقاء جهاز مستقبل مصر للتنمية المستدامة" />
      </div>
      <p class="setup-tagline">إنتقاء جهاز مستقبل مصر للتنمية المستدامة</p>

      <!-- Educational Level Selection -->
      <div id="step-level" class="setup-step active">
        <label class="step-label">
          <span class="step-num">⬡</span>
          اختر المستوى التعليمي
        </label>
        <div class="level-options">
          <button class="level-btn" data-level="عليا">
            <span class="level-title">عليا</span>
            <span class="level-cols">6 أعمدة</span>
          </button>
          <button class="level-btn" data-level="فوق متوسطة">
            <span class="level-title">فوق متوسطة</span>
            <span class="level-cols">6 أعمدة</span>
          </button>
          <button class="level-btn" data-level="متوسطة">
            <span class="level-title">متوسطة</span>
            <span class="level-cols">6 أعمدة</span>
          </button>
          <button class="level-btn" data-level="عادة">
            <span class="level-title">عادة</span>
            <span class="level-cols">5 أعمدة</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app" class="hidden">
    <!-- Header -->
    <header class="app-header">
      <div class="header-brand" aria-label="إنتقاء جهاز مستقبل مصر للتنمية المستدامة">
        <img class="brand-logo header-brand-logo" src="logo.png" alt="شعار إنتقاء جهاز مستقبل مصر للتنمية المستدامة" />
      </div>
      <div class="header-meta" id="table-meta"></div>
      <button class="ghost-btn" id="btn-reset" title="البدء من جديد">↺ إعادة</button>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="action-btn add" id="btn-add-row">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          إضافة صف
        </button>
      </div>
      <div class="toolbar-right">
        <span id="row-counter" class="row-counter">0 صف</span>
        <button class="action-btn export" id="btn-export">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          مشاركة Excel
        </button>
      </div>
    </div>

    <!-- Table area -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state hidden">
          <span class="empty-icon">⬡</span>
          <p>لا توجد صفوف — اضغط <strong>إضافة صف</strong> لبدء الإدخال.</p>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <!-- ── ADD ROW MODAL ── -->
  <div id="add-row-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">إضافة شخص جديد</h2>
        <button class="modal-close" id="modal-close-btn" aria-label="إغلاق">×</button>
      </div>
      <form id="add-row-form" class="modal-form">
        <!-- Form fields will be generated dynamically -->
        <div id="form-fields"></div>
        <div class="modal-actions">
          <button type="button" class="modal-btn cancel" id="modal-cancel-btn">إلغاء</button>
          <button type="submit" class="modal-btn save">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
